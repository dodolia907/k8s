apiVersion: v1
kind: ServiceAccount
metadata:
  name: fortigate-sdn-sa
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: fortigate-sdn-role
rules:
- apiGroups: [""]
  resources: ["nodes", "pods", "services", "endpoints", "namespaces"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["networking.k8s.io"]
  resources: ["ingresses"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: fortigate-sdn-rolebinding
subjects:
- kind: ServiceAccount
  name: fortigate-sdn-sa
  namespace: kube-system
roleRef:
  kind: ClusterRole
  name: fortigate-sdn-role
  apiGroup: rbac.authorization.k8s.io