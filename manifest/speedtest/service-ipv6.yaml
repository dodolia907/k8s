apiVersion: v1
kind: Service
metadata:
  name: speedtest-service-v6
  labels:
    app: speedtest
    io.cilium/lb-pool: ula
  namespace: speedtest
  annotations:
    external-dns.alpha.kubernetes.io/hostname: speedtest.svc.ddlia.com
    external-dns.alpha.kubernetes.io/provider: "pihole"
spec:
  ipFamilyPolicy: SingleStack
  ipFamilies:
  - IPv6
  selector:
    app: speedtest
  type: LoadBalancer
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 3000
    - name: https
      protocol: TCP
      port: 443
      targetPort: 3001