apiVersion: v1
kind: Service
metadata:
  name: speedtest-service
  labels:
    app: speedtest
    announce: bgp-v4
  namespace: speedtest
  annotations:
    external-dns.alpha.kubernetes.io/hostname: speedtest.svc.ddlia.com
    external-dns.alpha.kubernetes.io/provider: "pihole"
spec:
  selector:
    app: speedtest
  type: LoadBalancer
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 3000
    - name: https
      protocol: TCP
      port: 443
      targetPort: 3001