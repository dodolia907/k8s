apiVersion: v1
kind: Service
metadata:
  name: nginx-gv6
  labels:
    app: nginx-test
    io.cilium/lb-pool: gua
  namespace: nginx-test
  annotations:
    external-dns.alpha.kubernetes.io/hostname: test.dd.technotut.net
    external-dns.alpha.kubernetes.io/provider: "cloudflare"
spec:
  ipFamilyPolicy: SingleStack
  ipFamilies:
  - IPv6
  selector:
    app: nginx-test
  type: LoadBalancer
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 80

---

apiVersion: v1
kind: Service
metadata:
  name: nginx
  labels:
    app: nginx-test
    io.cilium/lb-pool: ula
    announce: bgp-v4
  namespace: nginx-test
  annotations:
    external-dns.alpha.kubernetes.io/hostname: test.svc.ddlia.com
    external-dns.alpha.kubernetes.io/provider: "pihole"
spec:
  ipFamilyPolicy: PreferDualStack
  ipFamilies:
  - IPv4
  - IPv6
  selector:
    app: nginx-test
  type: LoadBalancer
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 80
