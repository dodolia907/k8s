apiVersion: v1
kind: Service
metadata:
  name: murchace
  namespace: murchace
  labels:
    announce: bgp-v4
  annotations:
    external-dns.alpha.kubernetes.io/hostname: murchace.svc.ddlia.com
    external-dns.alpha.kubernetes.io/provider: "pihole"
spec:
  selector:
    app: murchace
  type: LoadBalancer
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000