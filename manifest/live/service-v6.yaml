apiVersion: v1
kind: Service
metadata:
  name: rtmp-service-v6
  labels:
    app: rtmp-live-server
  namespace: live
  annotations:
    external-dns.alpha.kubernetes.io/hostname: live.svc.ddlia.com
    io.cilium/lb-ipam-pools: "ipv6-ndp-pool-ula"
spec:
  ipFamilyPolicy: SingleStack
  ipFamilies:
  - IPv6
  selector:
    app: rtmp-live-server
  type: LoadBalancer
  ports:
    - name: rtmp
      protocol: TCP
      port: 1935
      targetPort: 1935
    - name: http
      protocol: TCP
      port: 80
      targetPort: 8080
